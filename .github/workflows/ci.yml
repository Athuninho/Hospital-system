name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ matrix.node-version }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v2

      - name: Run linter
        run: pnpm lint

      - name: Dependency audit (pnpm)
        run: |
          set -e
          pnpm audit --json > pnpm-audit.json || true
          cat pnpm-audit.json

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: pnpm-audit.json

      - name: Generate Prisma client (optional)
        run: npx prisma generate || true

      - name: Run API tests
        run: pnpm --filter @hospital/api-gateway test -- --outputFile=apps/api-gateway/test-results/junit.xml

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-report
          path: apps/api-gateway/test-results/junit.xml

      - name: Finalize CodeQL
        if: always()
        uses: github/codeql-action/analyze@v2

      - name: Comment PR with CodeQL alert summary and fail on high-severity
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            core.info(`Checking code scanning alerts for ${owner}/${repo}`);
            const resp = await github.rest.codeScanning.listAlertsForRepo({ owner, repo, state: 'open', per_page: 100 });
            const alerts = resp.data || [];
            const highSev = alerts.filter(a => {
              const rsev = (a.rule && (a.rule.severity || a.rule.level)) || (a.most_recent_instance && a.most_recent_instance.severity) || a.severity || '';
              const sev = String(rsev || '').toLowerCase();
              return sev === 'high' || sev === 'critical' || sev === 'error';
            });

            // If this is a PR, post or update a comment with a summary
            if (github.context.eventName === 'pull_request') {
              const prNumber = github.context.payload.pull_request.number;
              const marker = '<!-- codeql-alert-summary -->';
              let body = `${marker}\n## CodeQL Scan Summary\n`;
              body += `Total open alerts: **${alerts.length}**\n\n`;
              if (alerts.length > 0) {
                const top = alerts.slice(0, 10);
                body += '| Severity | Rule | Message | Location |\n';
                body += '|---|---|---|---|\n';
                for (const a of top) {
                  const sev = (a.rule && (a.rule.severity || a.rule.level)) || (a.most_recent_instance && a.most_recent_instance.severity) || a.severity || 'unknown';
                  const ruleName = a.rule ? (a.rule.id || a.rule.name || 'rule') : (a.rule_id || 'rule');
                  const message = a.alert_instance && a.alert_instance.message ? a.alert_instance.message.text : (a.rule && a.rule.description ? a.rule.description : '');
                  const alertUrl = a.html_url || `https://github.com/${owner}/${repo}/security/code-scanning/alerts/${a.number}`;
                  const location = (a.most_recent_instance && a.most_recent_instance.location && (a.most_recent_instance.location.path || a.most_recent_instance.location.start_line)) ? (a.most_recent_instance.location.path || `line ${a.most_recent_instance.location.start_line}`) : '';
                  body += `| ${sev} | [${ruleName}](${alertUrl}) | ${message.replace(/\|/g, '\\|').slice(0,120)} | ${location} |\n`;
                }
                if (alerts.length > 10) body += `\nAnd ${alerts.length - 10} more...`;
              }

              // find existing bot comment
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
              const existing = comments.find(c => c.body && c.body.startsWith(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                core.info('Updated existing CodeQL alert summary comment.');
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
                core.info('Created CodeQL alert summary comment.');
              }
            }

            if (highSev.length > 0) {
              core.setFailed(`CodeQL found ${highSev.length} high/critical severity alert(s). Review: https://github.com/${owner}/${repo}/security/code-scanning`);
            } else {
              core.info('No high-severity code scanning alerts found.');
            }
