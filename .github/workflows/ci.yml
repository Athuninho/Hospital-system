name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ matrix.node-version }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v2

      - name: Run linter
        run: pnpm lint

      - name: Dependency audit (pnpm)
        run: |
          set -e
          pnpm audit --json > pnpm-audit.json || true
          cat pnpm-audit.json

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: pnpm-audit.json

      - name: Generate Prisma client (optional)
        run: npx prisma generate || true

      - name: Run API tests
        run: pnpm --filter @hospital/api-gateway test -- --outputFile=apps/api-gateway/test-results/junit.xml

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-report
          path: apps/api-gateway/test-results/junit.xml

      - name: Finalize CodeQL
        if: always()
        uses: github/codeql-action/analyze@v2

      - name: Fail on high-severity CodeQL alerts
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            core.info(`Checking code scanning alerts for ${owner}/${repo}`);
            const resp = await github.rest.codeScanning.listAlertsForRepo({ owner, repo, state: 'open', per_page: 100 });
            const alerts = resp.data || [];
            const highSev = alerts.filter(a => {
              const rsev = (a.rule && (a.rule.severity || a.rule.level)) || (a.most_recent_instance && a.most_recent_instance.severity) || a.severity || '';
              const sev = String(rsev || '').toLowerCase();
              return sev === 'high' || sev === 'critical' || sev === 'error';
            });
            if (highSev.length > 0) {
              core.setFailed(`CodeQL found ${highSev.length} high/critical severity alert(s). Review: https://github.com/${owner}/${repo}/security/code-scanning`);
            } else {
              core.info('No high-severity code scanning alerts found.');
            }
